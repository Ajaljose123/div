<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine - Premium Landing Page</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cover-page">
        <a href="#" class="logo" onclick="location.reload(); return false;">
            <img src="logo.png" alt="Divine Logo">
        </a>
        
        <div class="content-wrapper">
            <header class="hero-content">
                <h1 class="main-title">DIVINE</h1>
                <p class="tagline">Where elegance meets inspiration</p>
                <div class="demo-text">
                    <p>Experience the perfect blend of sophistication and simplicity. Our premium approach transforms ordinary moments into extraordinary experiences.</p>
                </div>
                <div class="cta-section">
                    <button class="primary-btn">Discover More</button>
                    <button class="secondary-btn">Learn More</button>
                </div>
            </header>
        </div>
        
        <div class="bible-decoration">
            <img src="bible.jpg" alt="Bible">
        </div>
        
        <div class="scroll-indicator">
            <div class="scroll-arrow"></div>
            <span>Scroll</span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
